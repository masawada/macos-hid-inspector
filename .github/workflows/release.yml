name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - id: tagpr
        uses: Songmu/tagpr@9bbb945b2fb025126186661e27d55485e3fc6df6 # v1.18.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - arch: arm64
            archive_arch: arm64
          - arch: x86_64
            archive_arch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build binary
        run: swift build -c release --arch ${{ matrix.arch }}

      - name: Create archive
        run: |
          TAG="${{ needs.tagpr.outputs.tag }}"
          ARCHIVE_NAME="inspect-hid_${TAG}_darwin_${{ matrix.archive_arch }}"
          mkdir "${ARCHIVE_NAME}"
          cp .build/release/inspect-hid "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: archive-${{ matrix.archive_arch }}
          path: "*.tar.gz"

  release:
    needs: [tagpr, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: Upload to GitHub Release
        run: gh release upload "${{ needs.tagpr.outputs.tag }}" *.tar.gz checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish GitHub Release
        run: gh release edit "${{ needs.tagpr.outputs.tag }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
